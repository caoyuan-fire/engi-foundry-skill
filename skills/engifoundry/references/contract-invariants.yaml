schemaVersion: 1
kind: engifoundry-invariants-contract
source: references/contracts.md
invariants:
  controlSource:
    statement: "Markdown explains. JSON controls."
    machineControl: json
    humanNarrative: markdown
    summaryMd: human-only
    jsonMustNotDuplicateLongMarkdownNarratives: true
    markdownMustNotDuplicateMachineControlState: true
  roleAuthority:
    defaultAuthority: primary/control
    primaryOnlyActionsRequirePrimaryControl: true
    adaptersGrantPrimaryControl: false
    productNamesBindRoles: false
    boundedSessionsMustNot:
      - "approve Job completion"
      - "modify package scope"
      - "modify Job order"
      - "modify acceptance policy"
      - "revise default execution policy"
      - "drive the next Job automatically"
  packageFirstConflict:
    appliesAfterPackageFlow: true
    approvedPackageOrJobJsonIsExecutionContract: true
    laterChatInstructionsOverridePackageOrJobJson: false
    conflictExamples:
      - "out-of-order Jobs"
      - "unmet dependencies"
      - "non-delegable work"
      - "scope expansion"
      - "forbidden edits"
      - "skipped verification"
      - "bypassed stop conditions"
      - "changed acceptance criteria"
      - "changed execution policy"
      - "role changes not recorded by primary/control"
    onlyPrimaryControlMayRevisePackageRules: true
    revisionsRecordedBeforeExecutorOrReviewerFollowsThem: true
  packagePlanning:
    target: "planning.status=ready or formal blocker"
    draftIsCompletionState: false
    discardedAllowed: true
    primaryControlTargetsReadyInSameRequestForCreateCompilePrepare: true
    doNotStopAtDraftUnless:
      - "concrete blocker prevents readiness"
      - "user explicitly asks for a draft"
    evaluateAlignmentBeforeReady: true
    primaryControlSelfReviewSufficientWhenAlignmentRequired: false
    directControlContinuityUserApprovalCanSatisfyAlignment: true
    blockedOutputMustAskUserToChoose: "prominently state blocker reason and ask which executor, reviewer, clean session, external CLI, or human reviewer path to use"
    reportCompleteWhileDraft: false
  rootBoundaries:
    artifactRootPurpose: "durable work products only"
    packageRootPurpose: "execution inputs"
    artifactRootMustNotContain:
      - cache files
      - temporary files
      - session dumps
      - downloaded modules
      - raw model logs
      - secrets
      - tokens
      - private runtime state
      - transient executor state
    roadmapStateLocation: package-root
    roadmapStateInProjectConfig: false
    packageRootGitVisibilityDeterminedByGit: true
    gitIgnoreStateInProjectConfig: false
  executorAndAdapterAuthority:
    defaultExecutor: direct
    preferArtifactRootExecutionConfigAfterLocatingArtifactRoot: true
    discoverOrAskWhenBoundedPackageExecutorMissing: true
    inferCapabilityFromProductNames: false
    abortLongRunningExecutorOnlyForFixedElapsedTime: false
    continuouslyIngestRawExecutorStreamsDuringNormalMonitoring: false
  verification:
    completionRequiresFreshEvidence: true
    explicitNonRunnableVerificationRecordAllowed: true
    failedVerificationIsFailedResult: true
    nonRunnableRecordRequires:
      - reason
      - alternative evidence
      - residual risk
    executorCompletionCompletesJob: false
    jobCompletionRequires:
      - required records
      - verification evidence
      - review
      - primary/control approval
      - consistency with package contract
