schemaVersion: 1
kind: engifoundry-workflow-contract
source: references/contract.yaml
purpose: "Ordered workflow contract derived from EngiFoundry rule contracts and detail references."
gateLevels:
  must:
    failureOutcome:
      - blocked
      - discarded
      - explicit-user-draft
      - concrete-user-pause
    completionImpact: "Cannot report success, readiness, completion, or approval if unmet."
  classic:
    failureOutcome:
      - recorded-deviation
      - residual-risk
    completionImpact: "Deviation requires recorded rationale, evidence, and residual risk."
  weak:
    failureOutcome:
      - note-if-risk-relevant
    completionImpact: "Deviation should be mentioned when it affects risk, quality, or handoff."
  optional:
    failureOutcome:
      - no-blocker
    completionImpact: "Missing optional evidence is not success evidence."
workflow:
  first: classify-request
steps:
  classify-request:
    gateLevel: must
    ruleRefs:
      - contract-operating-model.workflow.modes
      - contract-operating-model.workflow.selectionRule
      - references/intent-routing.md
    requires:
      - "select exactly one workflow mode"
      - "determine whether package flow applies"
      - "use the least ceremony compatible with risk"
    next: establish-authority
  establish-authority:
    gateLevel: must
    ruleRefs:
      - contract-operating-model.authority
      - contract-invariants.invariants.roleAuthority
      - references/role-protocol.md
    requires:
      - "resolve role before primary-only, executor, reviewer, or audit-control work"
      - "bounded executor/reviewer work has autoDrive=false"
      - "primary-only actions require primary/control"
    next: locate-roots
  locate-roots:
    gateLevel: must
    ruleRefs:
      - contract-operating-model.durableRoots
      - contract-invariants.invariants.rootBoundaries
      - references/artifact-root.md
    requires:
      - "locate or initialize artifactRoot when durable records are needed"
      - "locate or initialize packageRoot when package flow applies"
      - "keep package contracts under packageRoot and durable records under artifactRoot"
    next: read-execution-config
  read-execution-config:
    gateLevel: must
    appliesWhen:
      - package-planning
      - package-alignment
      - job-execution
      - review-only
      - package-revision
      - closeout
    ruleRefs:
      - contract-invariants.invariants.executorAndAdapterAuthority.preferArtifactRootExecutionConfigAfterLocatingArtifactRoot
      - references/execution-config.md
    requires:
      - "read <artifact-root>/execution.config.json when present"
      - "record missing executor config as an explicit fact when package work needs bounded or isolated execution"
      - "do not infer executor capability from product names"
    next: route-by-mode
  route-by-mode:
    gateLevel: must
    ruleRefs:
      - contract-namespaces.modeRouting
    branches:
      ad-hoc: ad-hoc.execute-bounded-task
      package-planning: package-planning.write-contracts
      package-alignment: package-alignment.review-package
      job-execution: job-execution.reader-acknowledgement
      review-only: review-only.review-target
      package-revision: package-revision.revise-contracts
      closeout: closeout.record-handoff
      audit: audit.collect-evidence
modeFlows:
  ad-hoc:
    first: execute-bounded-task
    steps:
      execute-bounded-task:
        gateLevel: classic
        ruleRefs:
          - references/engineering-discipline.md
        requires:
          - "apply engineering discipline proportional to risk"
          - "use test-first development for behavior changes when feasible"
        next: verify-ad-hoc
      verify-ad-hoc:
        gateLevel: must
        ruleRefs:
          - contract-invariants.invariants.verification
        requires:
          - "fresh verification evidence or explicit non-runnable verification record"
        next: report-terminal-state
      report-terminal-state:
        gateLevel: must
        terminalStates:
          - completed-with-verification
          - non-runnable-verification-recorded
          - blocked
  package-planning:
    first: write-contracts
    steps:
      write-contracts:
        gateLevel: must
        ruleRefs:
          - references/package-planning.md#planning-control-loop
          - references/package-format.md
          - references/job-format.md
        requires:
          - "write or revise summary.md"
          - "write or revise package.config.json"
          - "write or revise every job.config.json"
          - "JSON package and Job contracts remain the machine-control source"
        next: preserve-executor-path
      preserve-executor-path:
        gateLevel: must
        ruleRefs:
          - references/execution-config.md
          - contract-invariants.invariants.executorAndAdapterAuthority
          - references/adapter-contract.md
        requires:
          - "If execution.config.json names a usable executor, do not silently downgrade to direct."
          - "If package work needs bounded or isolated execution, preserve or record executor-agent path."
          - "If all package and Job execution policies are direct/current-session and project history shows direct-control continuity, do not invent a missing executor blocker."
          - "If primary/control takes over previously delegated or isolated work, record the takeover reason before changing package or Job execution policy."
          - "If no usable executor path exists, keep or set planning.status=blocked instead of inventing readiness."
        forbidden:
          - "erase configured executor-agent path without recorded takeover or blocker"
          - "treat direct execution as clean-session review"
        failureOutcome: blocked
        next: evaluate-alignment-gate
      evaluate-alignment-gate:
        gateLevel: must
        ruleRefs:
          - references/package-planning.md#package-alignment-gate
          - contract-invariants.invariants.packagePlanning.evaluateAlignmentBeforeReady
        triggers:
          - "executor is not direct"
          - "isolated execution or isolated review"
          - "external CLI execution"
          - "reviewer handoff"
          - "human handoff"
          - "later-session execution"
          - "bounded execution"
          - "cross-module behavior"
          - "build behavior"
          - "AIDL or interface contracts"
          - "public API surface"
          - "release behavior"
          - "security-sensitive behavior"
          - "data-sensitive behavior"
          - "target-device evidence"
          - "unclear verification"
          - "non-runnable verification"
          - "unresolved dependency"
          - "known ambiguity"
        requires:
          - "compute whether Package Alignment Gate is required"
          - "record or preserve the triggering factors when the gate is required"
        next:
          ifRequired: independent-alignment
          ifNotRequired: ready-candidate-check
      independent-alignment:
        gateLevel: must
        ruleRefs:
          - references/package-planning.md#alignment-evidence
          - contract-invariants.invariants.packagePlanning.primaryControlSelfReviewSufficientWhenAlignmentRequired
        requires:
          - "reviewer role must not be primary/control self-review"
          - "reviewer identity must be recorded"
          - "reviewed files and pass/block decision must be recorded"
          - "findings, required revisions, accepted non-blocking risks, and primary/control decision must be recorded"
          - "direct-control continuity plus explicit user approval may satisfy alignment without independent executor handoff"
          - "blocked output must prominently state the blocker reason and ask the user which executor or reviewer path to use"
        forbiddenEvidence:
          - "primary/control self-review as pass evidence"
        forbidden:
          - "synthetic JOB-000 alignment"
          - "design approval as package readiness approval"
        failureOutcome: blocked
        next:
          ifPass: ready-candidate-check
          ifBlock: revise-or-block
      revise-or-block:
        gateLevel: must
        ruleRefs:
          - references/package-planning.md#planning-control-loop
        requires:
          - "revise package and rerun alignment when issues are resolvable"
          - "set or keep planning.status=blocked when a blocker remains"
        next:
          ifRevised: evaluate-alignment-gate
          ifBlocked: set-terminal-planning-state
      ready-candidate-check:
        gateLevel: must
        ruleRefs:
          - contract-invariants.invariants.packagePlanning
          - contract-invariants.invariants.verification
          - references/package-planning.md#execution-boundary
        requires:
          - "planning.status=ready only after all must gates pass"
          - "package and Job JSON are valid and internally consistent"
          - "executor policy matches execution.config.json or a recorded package override"
          - "no executor-agent path was erased without recorded takeover or blocker"
          - "ignored package-root machine contract fields are summarized in durable readiness evidence"
        next: set-terminal-planning-state
      set-terminal-planning-state:
        gateLevel: must
        outcomes:
          ready:
            requires:
              - "all must gates passed"
              - "clean independent alignment passed when required"
              - "package contract internally consistent"
          blocked:
            requires:
              - "blocker reason recorded"
          discarded:
            requires:
              - "discard reason recorded"
          draft:
            allowedOnlyWhen:
              - "user explicitly requested draft output"
  package-alignment:
    first: review-package
    steps:
      review-package:
        gateLevel: must
        ruleRefs:
          - references/package-planning.md#alignment-evidence
          - references/role-protocol.md
        requires:
          - "review relevant roadmap, summary, package config, and Job configs"
          - "reviewer identity and role are recorded"
          - "pass/block decision is tied to evidence"
        next: prepare-review-output-contract
      prepare-review-output-contract:
        gateLevel: must
        ruleRefs:
          - references/execution-policy.md#executor-output-cost-control
          - references/adapter-contract.md#executor-output-cost-control
        requires:
          - "reviewer prompt must request minimal-noise output"
          - "reviewer must not emit thinking, reasoning trace, raw tool stream, or long logs as final output"
          - "reviewer final handback must contain only the review decision, evidence paths, findings, required revisions, known gaps, and control-needed status"
          - "durable review records are the target outputs"
        next: return-alignment-decision
      return-alignment-decision:
        gateLevel: must
        terminalStates:
          - pass
          - block
          - concrete-blocker
  job-execution:
    first: reader-acknowledgement
    steps:
      reader-acknowledgement:
        gateLevel: must
        ruleRefs:
          - references/package-format.md#reader-acknowledgement
        requires:
          - "acknowledge package and Job contract before execution"
          - "planning.status=ready before starting execution"
        next: prepare-executor-output-contract
      prepare-executor-output-contract:
        gateLevel: must
        ruleRefs:
          - references/execution-policy.md#executor-output-cost-control
          - references/job-format.md#delegability-and-stop-conditions
          - references/adapter-contract.md#executor-output-cost-control
        requires:
          - "executor prompt must request minimal-noise output"
          - "executor must not emit thinking, reasoning trace, raw tool stream, or long logs as final output"
          - "executor final handback must follow job.config.json outputContract"
          - "executor final handback must contain only status, changed files, durable record paths, verification result, known gaps, and control-needed status"
          - "durable records and verification files are the target outputs"
        next: execute-job-contract
      execute-job-contract:
        gateLevel: must
        ruleRefs:
          - references/job-format.md
          - references/execution-policy.md
        requires:
          - "follow allowed areas, forbidden areas, dependencies, stop conditions, and verification requirements"
        next: record-and-return
      record-and-return:
        gateLevel: must
        requires:
          - "write required records and verification evidence"
          - "return compact evidence index"
        terminalStates:
          - returned-for-review
          - job-blocked
          - package-blocked
          - explicit-bounded-handoff
  review-only:
    first: review-target
    steps:
      review-target:
        gateLevel: must
        ruleRefs:
          - references/role-protocol.md
          - references/engineering-discipline.md
        requires:
          - "tie findings to evidence"
          - "do not approve primary/control-only completion from bounded reviewer role"
        terminalStates:
          - pass
          - needs-rework
          - blocked
  package-revision:
    first: revise-contracts
    steps:
      revise-contracts:
        gateLevel: must
        ruleRefs:
          - contract-invariants.invariants.packageFirstConflict
          - references/package-format.md
        requires:
          - "only primary/control may revise package rules"
          - "record revisions before executor or reviewer follows them"
        terminalStates:
          - revised
          - blocked
  closeout:
    first: record-handoff
    steps:
      record-handoff:
        gateLevel: must
        ruleRefs:
          - references/handoff-and-checkpoint.md
          - contract-invariants.invariants.verification
        requires:
          - "record final acceptance, remaining risk, verification status, and handoff notes"
        terminalStates:
          - closed
          - blocked
  audit:
    first: collect-evidence
    steps:
      collect-evidence:
        gateLevel: must
        ruleRefs:
          - references/engineering-discipline.md
          - references/artifact-root.md
        requires:
          - "record findings and evidence"
          - "separate root cause from corrective action"
        terminalStates:
          - audit-recorded
          - blocked
